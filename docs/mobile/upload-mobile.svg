<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" font-family="Manrope, system-ui, sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7B61FF"/><stop offset="1" stop-color="#B388FF"/>
    </linearGradient>
    <clipPath id="phone"><rect width="375" height="812" rx="44"/></clipPath>
  </defs>
  <g clip-path="url(#phone)">
    <rect width="375" height="812" fill="#F8F7FB"/>

    <!-- Status bar -->
    <text x="32" y="34" fill="#1A1832" font-size="14" font-weight="700">9:41</text>
    <g transform="translate(310, 22)" fill="#1A1832">
      <circle cx="0" cy="8" r="2"/><circle cx="8" cy="8" r="2"/><circle cx="16" cy="8" r="2"/>
      <rect x="22" y="3" width="20" height="10" rx="2" stroke="#1A1832" stroke-width="1" fill="none"/>
      <rect x="24" y="5" width="14" height="6" fill="#1A1832"/>
    </g>

    <!-- Header -->
    <text x="20" y="80" fill="#1A1832" font-size="24" font-weight="800" letter-spacing="-0.5">Upload manual</text>
    <text x="20" y="102" fill="#6E6884" font-size="13">Envie relatórios sem abrir o chat</text>

    <text x="355" y="80" text-anchor="end" fill="#7B61FF" font-size="20">✨</text>

    <!-- Contract selector -->
    <text x="20" y="142" fill="#3F3954" font-size="11" font-weight="700" letter-spacing="0.5">ATRIBUIR A UM CONTRATO</text>
    <rect x="20" y="152" width="335" height="48" rx="12" fill="#FFFFFF" stroke="#E0DCEC"/>
    <text x="36" y="182" fill="#1A1832" font-size="14" font-weight="600">Royalties — Editora</text>
    <text x="339" y="182" text-anchor="end" fill="#9690AE" font-size="13">▾</text>

    <!-- Drop zone -->
    <rect x="20" y="220" width="335" height="220" rx="20" fill="#FFFFFF" stroke="#7B61FF" stroke-width="2" stroke-dasharray="8 5"/>

    <circle cx="187.5" cy="290" r="36" fill="#F3EFFF"/>
    <text x="187.5" y="300" text-anchor="middle" font-size="32">📤</text>

    <text x="187.5" y="356" text-anchor="middle" fill="#1A1832" font-size="17" font-weight="700">Toque para escolher</text>
    <text x="187.5" y="376" text-anchor="middle" fill="#6E6884" font-size="13">CSV, XLSX, PDF ou imagens</text>

    <g transform="translate(95, 396)" filter="drop-shadow(0 8px 24px rgba(123,97,255,0.3))">
      <rect width="186" height="40" rx="12" fill="url(#brand)"/>
      <text x="93" y="26" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">Selecionar arquivos</text>
    </g>

    <text x="187.5" y="460" text-anchor="middle" fill="#9690AE" font-size="11">Até 20 MB por arquivo</text>

    <!-- Files in session -->
    <text x="20" y="500" fill="#1A1832" font-size="14" font-weight="700">Esta sessão</text>
    <text x="355" y="500" text-anchor="end" fill="#7B61FF" font-size="12" font-weight="600">Limpar</text>

    <!-- File 1: processed -->
    <rect x="20" y="514" width="335" height="72" rx="12" fill="#FFFFFF" filter="drop-shadow(0 1px 2px rgba(0,0,0,0.06))"/>
    <rect x="32" y="526" width="32" height="32" rx="8" fill="#C0F3E2"/>
    <text x="48" y="548" text-anchor="middle" fill="#003D33" font-size="10" font-weight="800">XLS</text>

    <text x="76" y="540" fill="#1A1832" font-size="13" font-weight="700">royalties_abril.xlsx</text>
    <text x="76" y="556" fill="#6E6884" font-size="11">128 KB · 8 destinatárias</text>

    <rect x="76" y="562" width="80" height="20" rx="10" fill="#C0F3E2"/>
    <text x="116" y="576" text-anchor="middle" fill="#003D33" font-size="10" font-weight="700">✓ Processado</text>

    <rect x="240" y="540" width="100" height="32" rx="8" fill="url(#brand)"/>
    <text x="290" y="560" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="600">Revisar →</text>

    <!-- File 2: processing -->
    <rect x="20" y="598" width="335" height="72" rx="12" fill="#FFFFFF" filter="drop-shadow(0 1px 2px rgba(0,0,0,0.06))"/>
    <rect x="32" y="610" width="32" height="32" rx="8" fill="#DDF0FF"/>
    <text x="48" y="632" text-anchor="middle" fill="#0B4F8A" font-size="10" font-weight="800">CSV</text>

    <text x="76" y="624" fill="#1A1832" font-size="13" font-weight="700">amazon_kdp.csv</text>
    <text x="76" y="640" fill="#6E6884" font-size="11">64 KB · IA processando…</text>

    <rect x="76" y="650" width="263" height="4" rx="2" fill="#EFEDF5"/>
    <rect x="76" y="650" width="190" height="4" rx="2" fill="#3CA7FF"/>

    <text x="339" y="628" text-anchor="end" fill="#0B4F8A" font-size="11" font-weight="700">72%</text>

    <!-- Help microcopy -->
    <rect x="20" y="688" width="335" height="60" rx="12" fill="#F3EFFF"/>
    <text x="36" y="712" font-size="18">💡</text>
    <text x="64" y="710" fill="#4D33B5" font-size="12" font-weight="700">Mesmo processamento do chat IA</text>
    <text x="64" y="728" fill="#4D33B5" font-size="11">Se algo falhar, abra no chat para refinar</text>
    <text x="64" y="742" fill="#4D33B5" font-size="11">conversando com o agente.</text>

    <!-- Bottom nav -->
    <rect x="0" y="728" width="375" height="84" fill="#FFFFFF"/>
    <line x1="0" y1="728" x2="375" y2="728" stroke="#E0DCEC"/>

    <g font-size="10" font-weight="600">
      <text x="36" y="754" text-anchor="middle" font-size="20" opacity="0.5">🏠</text>
      <text x="36" y="772" text-anchor="middle" fill="#9690AE">Início</text>

      <text x="105" y="754" text-anchor="middle" font-size="20" opacity="0.5">📋</text>
      <text x="105" y="772" text-anchor="middle" fill="#9690AE">Contratos</text>

      <g filter="drop-shadow(0 8px 24px rgba(123,97,255,0.4))">
        <rect x="160" y="734" width="56" height="52" rx="20" fill="url(#brand)"/>
        <text x="188" y="766" text-anchor="middle" fill="#FFFFFF" font-size="22">📤</text>
      </g>

      <text x="270" y="754" text-anchor="middle" font-size="20" opacity="0.5">🧾</text>
      <text x="270" y="772" text-anchor="middle" fill="#9690AE">Recibos</text>

      <text x="339" y="754" text-anchor="middle" font-size="20" opacity="0.5">⚙</text>
      <text x="339" y="772" text-anchor="middle" fill="#9690AE">Mais</text>
    </g>

    <rect x="125" y="796" width="125" height="5" rx="3" fill="#1A1832"/>
  </g>
</svg>
