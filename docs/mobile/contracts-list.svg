<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" font-family="Manrope, system-ui, sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7B61FF"/><stop offset="1" stop-color="#B388FF"/>
    </linearGradient>
    <clipPath id="phone"><rect width="375" height="812" rx="44"/></clipPath>
  </defs>
  <g clip-path="url(#phone)">
    <rect width="375" height="812" fill="#F8F7FB"/>

    <!-- Status bar -->
    <text x="32" y="34" fill="#1A1832" font-size="14" font-weight="700">9:41</text>
    <g transform="translate(310, 22)" fill="#1A1832">
      <circle cx="0" cy="8" r="2"/><circle cx="8" cy="8" r="2"/><circle cx="16" cy="8" r="2"/>
      <rect x="22" y="3" width="20" height="10" rx="2" stroke="#1A1832" stroke-width="1" fill="none"/>
      <rect x="24" y="5" width="14" height="6" fill="#1A1832"/>
    </g>

    <!-- Header -->
    <text x="20" y="84" fill="#1A1832" font-size="24" font-weight="800" letter-spacing="-0.5">Contratos</text>
    <text x="20" y="106" fill="#6E6884" font-size="13">8 ativos · R$ 47.890 em saldo total</text>

    <!-- Search -->
    <rect x="20" y="124" width="335" height="44" rx="12" fill="#FFFFFF" stroke="#E0DCEC"/>
    <text x="38" y="151" fill="#9690AE" font-size="13">🔍   Buscar contrato ou destinatário</text>

    <!-- Chips -->
    <g font-size="12" font-weight="600">
      <rect x="20" y="184" width="78" height="32" rx="16" fill="#7B61FF"/>
      <text x="59" y="204" text-anchor="middle" fill="#FFFFFF">Todos · 8</text>

      <rect x="106" y="184" width="72" height="32" rx="16" fill="#FFFFFF" stroke="#E0DCEC"/>
      <text x="142" y="204" text-anchor="middle" fill="#3F3954">Ativos · 6</text>

      <rect x="186" y="184" width="92" height="32" rx="16" fill="#FFFFFF" stroke="#E0DCEC"/>
      <text x="232" y="204" text-anchor="middle" fill="#3F3954">Pausados · 1</text>

      <rect x="286" y="184" width="100" height="32" rx="16" fill="#FFFFFF" stroke="#E0DCEC"/>
      <text x="336" y="204" text-anchor="middle" fill="#3F3954">Encerrados</text>
    </g>

    <!-- Contract card 1 -->
    <rect x="20" y="232" width="335" height="146" rx="16" fill="#FFFFFF" filter="drop-shadow(0 4px 12px rgba(26,24,50,0.06))"/>
    <text x="36" y="258" fill="#1A1832" font-size="15" font-weight="700">Royalties — Editora</text>
    <text x="36" y="276" fill="#6E6884" font-size="12">Bimestral · 8 destinatárias</text>

    <rect x="270" y="244" width="68" height="22" rx="11" fill="#C0F3E2"/>
    <text x="304" y="259" text-anchor="middle" fill="#003D33" font-size="10" font-weight="700">● Ativo</text>

    <rect x="36" y="290" width="303" height="48" rx="12" fill="#F8F7FB"/>
    <text x="50" y="308" fill="#6E6884" font-size="10" font-weight="700" letter-spacing="1">SALDO DO CONTRATO</text>
    <text x="50" y="330" fill="#1A1832" font-size="18" font-weight="800">R$ 12.450</text>

    <line x1="36" y1="354" x2="339" y2="354" stroke="#EFEDF5"/>
    <text x="36" y="372" fill="#6E6884" font-size="12">Próximo: <tspan fill="#1A1832" font-weight="700">14 mai</tspan></text>
    <text x="339" y="372" text-anchor="end" fill="#6E6884" font-size="12">8 pessoas</text>

    <!-- Contract card 2 -->
    <rect x="20" y="394" width="335" height="146" rx="16" fill="#FFFFFF" filter="drop-shadow(0 4px 12px rgba(26,24,50,0.06))"/>
    <text x="36" y="420" fill="#1A1832" font-size="15" font-weight="700">Folha PJ — Time core</text>
    <text x="36" y="438" fill="#6E6884" font-size="12">Mensal · 3 colaboradores</text>

    <rect x="270" y="406" width="68" height="22" rx="11" fill="#C0F3E2"/>
    <text x="304" y="421" text-anchor="middle" fill="#003D33" font-size="10" font-weight="700">● Ativo</text>

    <rect x="36" y="452" width="303" height="48" rx="12" fill="#F8F7FB"/>
    <text x="50" y="470" fill="#6E6884" font-size="10" font-weight="700" letter-spacing="1">SALDO DO CONTRATO</text>
    <text x="50" y="492" fill="#1A1832" font-size="18" font-weight="800">R$ 18.300</text>

    <line x1="36" y1="516" x2="339" y2="516" stroke="#EFEDF5"/>
    <text x="36" y="534" fill="#6E6884" font-size="12">Próximo: <tspan fill="#1A1832" font-weight="700">20 mai</tspan></text>
    <text x="339" y="534" text-anchor="end" fill="#6E6884" font-size="12">3 pessoas</text>

    <!-- Contract card 3 (paused) -->
    <rect x="20" y="556" width="335" height="146" rx="16" fill="#FFFFFF" filter="drop-shadow(0 4px 12px rgba(26,24,50,0.06))"/>
    <text x="36" y="582" fill="#1A1832" font-size="15" font-weight="700">Comissões — Vendas Q2</text>
    <text x="36" y="600" fill="#6E6884" font-size="12">Único · 5 vendedores</text>

    <rect x="258" y="568" width="80" height="22" rx="11" fill="#FFF1D6"/>
    <text x="298" y="583" text-anchor="middle" fill="#7A5200" font-size="10" font-weight="700">⏸ Pausado</text>

    <rect x="36" y="614" width="303" height="48" rx="12" fill="#F8F7FB"/>
    <text x="50" y="632" fill="#6E6884" font-size="10" font-weight="700" letter-spacing="1">SALDO DO CONTRATO</text>
    <text x="50" y="654" fill="#1A1832" font-size="18" font-weight="800">R$ 4.200</text>

    <line x1="36" y1="678" x2="339" y2="678" stroke="#EFEDF5"/>
    <text x="36" y="696" fill="#6E6884" font-size="12">Aguardando aprovação</text>
    <text x="339" y="696" text-anchor="end" fill="#6E6884" font-size="12">5 pessoas</text>

    <!-- Bottom navigation -->
    <rect x="0" y="728" width="375" height="84" fill="#FFFFFF"/>
    <line x1="0" y1="728" x2="375" y2="728" stroke="#E0DCEC"/>

    <g font-size="10" font-weight="600">
      <text x="36" y="754" text-anchor="middle" font-size="20" opacity="0.5">🏠</text>
      <text x="36" y="772" text-anchor="middle" fill="#9690AE">Início</text>

      <text x="105" y="754" text-anchor="middle" font-size="20">📋</text>
      <text x="105" y="772" text-anchor="middle" fill="#7B61FF">Contratos</text>

      <g filter="drop-shadow(0 8px 24px rgba(123,97,255,0.4))">
        <rect x="160" y="734" width="56" height="52" rx="20" fill="url(#brand)"/>
        <text x="188" y="766" text-anchor="middle" fill="#FFFFFF" font-size="22">✨</text>
      </g>

      <text x="270" y="754" text-anchor="middle" font-size="20" opacity="0.5">🧾</text>
      <text x="270" y="772" text-anchor="middle" fill="#9690AE">Recibos</text>

      <text x="339" y="754" text-anchor="middle" font-size="20" opacity="0.5">⚙</text>
      <text x="339" y="772" text-anchor="middle" fill="#9690AE">Mais</text>
    </g>

    <rect x="125" y="796" width="125" height="5" rx="3" fill="#1A1832"/>
  </g>
</svg>
