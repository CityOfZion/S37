    <text x="113" y="266" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="600">＋ Adicionar saldo</text>

    <rect x="191" y="244" width="140" height="36" rx="12" fill="#FFFFFF" fill-opacity="0.18"/>
    <text x="261" y="266" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="600">✨ Novo contrato</text>

    <!-- Section: Next executions -->
