    <circle cx="350" cy="280" r="90" fill="#FFFFFF" fill-opacity="0.08"/>

    <text x="44" y="156" fill="#FFFFFF" fill-opacity="0.85" font-size="10" font-weight="700" letter-spacing="1.5">SALDO TOTAL NOS CONTRATOS</text>
    <text x="44" y="200" fill="#FFFFFF" font-size="36" font-weight="800" letter-spacing="-1">R$ 47.890,00</text>
    <text x="44" y="222" fill="#FFFFFF" fill-opacity="0.85" font-size="12">8 contratos ativos · próxima em 4 dias</text>

    <!-- Hero actions -->
