    <text x="343" y="340" text-anchor="end" fill="#7B61FF" font-size="12" font-weight="600">Ver tudo</text>

    <!-- Next pay card 1 -->
    <rect x="20" y="356" width="335" height="68" rx="16" fill="#FFFFFF" filter="drop-shadow(0 1px 2px rgba(0,0,0,0.06))"/>
    <rect x="36" y="372" width="48" height="48" rx="12" fill="#E4DAFF"/>
    <text x="60" y="395" text-anchor="middle" fill="#4D33B5" font-size="16" font-weight="800">14</text>
    <text x="60" y="411" text-anchor="middle" fill="#4D33B5" font-size="9" font-weight="700">MAI</text>
    <text x="100" y="385" fill="#1A1832" font-size="14" font-weight="600">Royalties — Maio</text>
    <text x="100" y="402" fill="#6E6884" font-size="12">8 autoras · bimestral</text>
    <text x="339" y="402" text-anchor="end" fill="#1A1832" font-size="14" font-weight="700">R$ 12.450</text>

    <!-- Next pay card 2 -->
    <rect x="20" y="432" width="335" height="68" rx="16" fill="#FFFFFF" filter="drop-shadow(0 1px 2px rgba(0,0,0,0.06))"/>
    <rect x="36" y="448" width="48" height="48" rx="12" fill="#E4DAFF"/>
    <text x="60" y="471" text-anchor="middle" fill="#4D33B5" font-size="16" font-weight="800">20</text>
    <text x="60" y="487" text-anchor="middle" fill="#4D33B5" font-size="9" font-weight="700">MAI</text>
    <text x="100" y="461" fill="#1A1832" font-size="14" font-weight="600">Folha PJ — Maio</text>
    <text x="100" y="478" fill="#6E6884" font-size="12">3 colaboradores · mensal</text>
    <text x="339" y="478" text-anchor="end" fill="#1A1832" font-size="14" font-weight="700">R$ 18.300</text>

