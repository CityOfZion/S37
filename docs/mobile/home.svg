    <text x="20" y="540" fill="#1A1832" font-size="14" font-weight="700">Atividade recente</text>
    <text x="343" y="540" text-anchor="end" fill="#7B61FF" font-size="12" font-weight="600">Histórico</text>

    <!-- Activity card -->
    <rect x="20" y="556" width="335" height="160" rx="16" fill="#FFFFFF" filter="drop-shadow(0 1px 2px rgba(0,0,0,0.06))"/>

    <!-- Item 1 -->
    <circle cx="50" cy="586" r="18" fill="#C0F3E2"/>
    <text x="50" y="592" text-anchor="middle" fill="#00A085" font-size="16" font-weight="700">↑</text>
    <text x="80" y="582" fill="#1A1832" font-size="13" font-weight="600">Pagamento enviado · Beatriz S.</text>
    <text x="80" y="598" fill="#6E6884" font-size="11">Royalties · há 2 horas</text>
    <text x="339" y="592" text-anchor="end" fill="#00A085" font-size="13" font-weight="700">R$ 1.245</text>

    <line x1="36" y1="616" x2="339" y2="616" stroke="#EFEDF5"/>

    <!-- Item 2 -->
    <circle cx="50" cy="640" r="18" fill="#C0F3E2"/>
    <text x="50" y="646" text-anchor="middle" fill="#00A085" font-size="16" font-weight="700">↑</text>
    <text x="80" y="636" fill="#1A1832" font-size="13" font-weight="600">Pagamento enviado · Lúcia M.</text>
    <text x="80" y="652" fill="#6E6884" font-size="11">Royalties · há 2 horas</text>
    <text x="339" y="646" text-anchor="end" fill="#00A085" font-size="13" font-weight="700">R$ 982</text>

    <line x1="36" y1="670" x2="339" y2="670" stroke="#EFEDF5"/>

    <!-- Item 3 -->
    <circle cx="50" cy="694" r="18" fill="#E4DAFF"/>
    <text x="50" y="700" text-anchor="middle" fill="#4D33B5" font-size="16" font-weight="700">＋</text>
    <text x="80" y="690" fill="#1A1832" font-size="13" font-weight="600">Saldo adicionado</text>
    <text x="80" y="706" fill="#6E6884" font-size="11">Royalties · ontem</text>
    <text x="339" y="700" text-anchor="end" fill="#1A1832" font-size="13" font-weight="700">R$ 25.000</text>

    <!-- Bottom navigation -->
    <rect x="0" y="728" width="375" height="84" fill="#FFFFFF"/>
    <line x1="0" y1="728" x2="375" y2="728" stroke="#E0DCEC"/>

    <g font-size="10" font-weight="600">
      <!-- Home (active) -->
      <text x="36" y="754" text-anchor="middle" font-size="20">🏠</text>
      <text x="36" y="772" text-anchor="middle" fill="#7B61FF">Início</text>

      <!-- Contracts -->
      <text x="105" y="754" text-anchor="middle" font-size="20" opacity="0.5">📋</text>
      <text x="105" y="772" text-anchor="middle" fill="#9690AE">Contratos</text>

      <!-- CTA -->
      <g filter="drop-shadow(0 8px 24px rgba(123,97,255,0.4))">
        <rect x="160" y="734" width="56" height="52" rx="20" fill="url(#brand)"/>
        <text x="188" y="766" text-anchor="middle" fill="#FFFFFF" font-size="22">✨</text>
      </g>

      <!-- Recibos -->
      <text x="270" y="754" text-anchor="middle" font-size="20" opacity="0.5">🧾</text>
      <text x="270" y="772" text-anchor="middle" fill="#9690AE">Recibos</text>

      <!-- More -->
      <text x="339" y="754" text-anchor="middle" font-size="20" opacity="0.5">⚙</text>
      <text x="339" y="772" text-anchor="middle" fill="#9690AE">Mais</text>
    </g>

    <!-- Home indicator -->
    <rect x="125" y="796" width="125" height="5" rx="3" fill="#1A1832"/>
  </g>
</svg>
