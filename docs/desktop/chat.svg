<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Manrope, system-ui, sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7B61FF"/><stop offset="1" stop-color="#B388FF"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="900" fill="#F8F7FB"/>

  <!-- ========== SIDEBAR (compacta) ========== -->
  <rect x="0" y="0" width="240" height="900" fill="#1A1832"/>
  <g transform="translate(24, 32)">
    <line x1="24" y1="8" x2="8" y2="40" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="24" y1="8" x2="40" y2="40" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="8" y1="40" x2="40" y2="40" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <circle cx="24" cy="8" r="7" fill="#FFFFFF"/>
    <circle cx="8" cy="40" r="7" fill="#FFFFFF"/>
    <circle cx="40" cy="40" r="7" fill="#00C9A7"/>
    <text x="58" y="32" fill="#FFFFFF" font-size="18" font-weight="800" letter-spacing="-0.5">FractaPay</text>
  </g>

  <text x="24" y="124" fill="#6E6884" font-size="10" font-weight="700" letter-spacing="1.5">MENU PRINCIPAL</text>
  <g font-size="14" font-weight="500">
    <text x="32" y="166" font-size="16" fill="#9690AE">🏠</text><text x="60" y="166" fill="#C9B5FF">Início</text>
    <text x="32" y="208" font-size="16" fill="#9690AE">📋</text><text x="60" y="208" fill="#C9B5FF">Contratos</text>

    <!-- Active: Chat IA -->
    <rect x="12" y="222" width="216" height="44" rx="10" fill="#7B61FF"/>
    <text x="32" y="250" font-size="16">✨</text><text x="60" y="250" fill="#FFFFFF" font-weight="600">Chat IA</text>

    <text x="32" y="292" font-size="16" fill="#9690AE">📤</text><text x="60" y="292" fill="#C9B5FF">Upload manual</text>
    <text x="32" y="334" font-size="16" fill="#9690AE">🧾</text><text x="60" y="334" fill="#C9B5FF">Recibos</text>
    <text x="32" y="376" font-size="16" fill="#9690AE">👥</text><text x="60" y="376" fill="#C9B5FF">Destinatários</text>
  </g>

  <text x="24" y="430" fill="#6E6884" font-size="10" font-weight="700" letter-spacing="1.5">CONVERSAS RECENTES</text>
  <g font-size="12" font-weight="500" fill="#C9B5FF">
    <text x="32" y="462">📌 Royalties Abril</text>
    <text x="32" y="490" fill="#9690AE">Folha PJ — Maio</text>
    <text x="32" y="518" fill="#9690AE">Comissões Q2</text>
    <text x="32" y="546" fill="#9690AE">Bônus Pedro</text>
  </g>

  <!-- User card bottom (same pattern) -->
  <rect x="12" y="816" width="216" height="64" rx="12" fill="#FFFFFF" fill-opacity="0.08"/>
  <rect x="24" y="828" width="40" height="40" rx="20" fill="url(#brand)"/>
  <text x="44" y="853" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">CC</text>
  <text x="72" y="843" fill="#FFFFFF" font-size="13" font-weight="600">Caroline C.</text>
  <text x="72" y="860" fill="#9690AE" font-size="11">Madame Rudini</text>

