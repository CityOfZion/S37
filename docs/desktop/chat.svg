  <text x="1052" y="318" fill="#6E6884" font-size="11" font-weight="700" letter-spacing="1">DESTINATÁRIAS</text>

  <g font-size="13">
    <rect x="1052" y="328" width="356" height="44" rx="10" fill="#F8F7FB"/>
    <text x="1068" y="356" fill="#1A1832" font-weight="600">Beatriz Souza</text>
    <text x="1392" y="356" text-anchor="end" fill="#4D33B5" font-weight="700">15% · R$ 1.867</text>

    <rect x="1052" y="380" width="356" height="44" rx="10" fill="#F8F7FB"/>
    <text x="1068" y="408" fill="#1A1832" font-weight="600">Lúcia Martins</text>
    <text x="1392" y="408" text-anchor="end" fill="#4D33B5" font-weight="700">12% · R$ 1.494</text>

    <rect x="1052" y="432" width="356" height="44" rx="10" fill="#F8F7FB"/>
    <text x="1068" y="460" fill="#1A1832" font-weight="600">Mariana Reis</text>
    <text x="1392" y="460" text-anchor="end" fill="#4D33B5" font-weight="700">10% · R$ 1.245</text>

    <rect x="1052" y="484" width="356" height="44" rx="10" fill="#F8F7FB"/>
    <text x="1068" y="512" fill="#1A1832" font-weight="600">Júlia Andrade</text>
    <text x="1392" y="512" text-anchor="end" fill="#4D33B5" font-weight="700">R$ 980 fixo</text>

    <rect x="1052" y="536" width="356" height="44" rx="10" fill="#F8F7FB"/>
    <text x="1068" y="564" fill="#1A1832" font-weight="600">+ 4 outras</text>
    <text x="1392" y="564" text-anchor="end" fill="#4D33B5" font-weight="700">R$ 6.864</text>
  </g>

  <!-- Footer actions -->
