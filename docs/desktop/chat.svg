  <rect x="296" y="816" width="36" height="36" rx="10" fill="#F3EFFF"/>
  <text x="314" y="840" text-anchor="middle" font-size="16">📎</text>

  <text x="346" y="840" fill="#9690AE" font-size="14">Pergunte ou anexe um arquivo… ou use a tela de Upload manual</text>

