  <line x1="240" y1="72" x2="1440" y2="72" stroke="#EFEDF5"/>

  <text x="272" y="40" fill="#1A1832" font-size="20" font-weight="800">✨ Assistente FractaPay</text>
  <circle cx="284" cy="54" r="4" fill="#00C9A7"/>
  <text x="294" y="58" fill="#00A085" font-size="11" font-weight="600">online · responde em segundos</text>

  <rect x="1196" y="20" width="160" height="40" rx="12" fill="#FFFFFF" stroke="#E0DCEC"/>
  <text x="1276" y="46" text-anchor="middle" fill="#3F3954" font-size="13" font-weight="600">+ Nova conversa</text>

  <rect x="1364" y="20" width="40" height="40" rx="12" fill="#F8F7FB" stroke="#E0DCEC"/>
  <text x="1384" y="46" text-anchor="middle" font-size="16">⋯</text>

