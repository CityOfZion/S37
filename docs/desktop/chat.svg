  <rect x="1052" y="840" width="100" height="40" rx="10" fill="#FFFFFF" stroke="#E0DCEC"/>
  <text x="1102" y="864" text-anchor="middle" fill="#3F3954" font-size="13" font-weight="600">Ajustar</text>

  <g transform="translate(1164, 840)" filter="drop-shadow(0 4px 12px rgba(123,97,255,0.3))">
    <rect width="244" height="40" rx="10" fill="url(#brand)"/>
    <text x="122" y="24" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">Revisar e ativar contrato →</text>
  </g>
</svg>
