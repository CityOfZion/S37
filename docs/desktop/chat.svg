    <rect width="36" height="36" rx="10" fill="url(#brand)"/>
    <text x="18" y="24" text-anchor="middle" font-size="16">✨</text>

    <rect x="48" y="0" width="500" height="64" rx="16" fill="#FFFFFF" filter="drop-shadow(0 1px 2px rgba(0,0,0,0.06))"/>
