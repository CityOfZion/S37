  <text x="436" y="116" text-anchor="middle" fill="#9690AE" font-size="11" font-weight="600">HOJE · 14:32</text>
  <line x1="492" y1="112" x2="592" y2="112" stroke="#E0DCEC"/>

  <!-- Agent message 1 -->
  <g transform="translate(280, 140)">
    <rect width="36" height="36" rx="10" fill="url(#brand)"/>
    <text x="18" y="24" text-anchor="middle" font-size="16">✨</text>

    <rect x="48" y="0" width="500" height="76" rx="16" fill="#FFFFFF" filter="drop-shadow(0 1px 2px rgba(0,0,0,0.06))"/>
    <text x="68" y="28" fill="#6E6884" font-size="11" font-weight="600">Assistente · 14:32</text>
    <text x="68" y="50" fill="#1A1832" font-size="14">Olá, Caroline! 👋 Posso te ajudar a criar um contrato,</text>
    <text x="68" y="68" fill="#1A1832" font-size="14">conferir pagamentos ou ajustar regras. O que você quer fazer?</text>
  </g>

  <!-- User message -->
  <g transform="translate(280, 240)">
    <text x="500" y="20" text-anchor="end" fill="#6E6884" font-size="11" font-weight="600">Caroline · 14:33</text>
    <rect x="60" y="28" width="440" height="44" rx="16" fill="#7B61FF"/>
    <text x="80" y="56" fill="#FFFFFF" font-size="14">Quero distribuir os royalties de abril. Anexei o relatório.</text>

