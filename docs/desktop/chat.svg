    <text x="132" y="108" fill="#FFFFFF" font-size="13" font-weight="600">royalties_abril.xlsx</text>
    <text x="132" y="124" fill="#FFFFFF" fill-opacity="0.75" font-size="11">128 KB · 42 linhas</text>
  </g>

