  <text x="1072" y="218" fill="#4D33B5" font-size="11" font-weight="700" letter-spacing="1">TOTAL A DISTRIBUIR</text>
  <text x="1072" y="252" fill="#1A1832" font-size="28" font-weight="800" letter-spacing="-0.5">R$ 12.450,00</text>
  <text x="1072" y="272" fill="#6E6884" font-size="12">Taxa FractaPay (1,5%): <tspan font-weight="600">R$ 186,75</tspan></text>

