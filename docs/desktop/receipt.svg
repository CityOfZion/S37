    <line x1="24" y1="600" x2="296" y2="600" stroke="#E0DCEC"/>

    <rect x="24" y="624" width="272" height="40" rx="10" fill="#F3EFFF"/>
    <text x="160" y="648" text-anchor="middle" fill="#7B61FF" font-size="13" font-weight="600">Abrir no explorer público →</text>

    <text x="160" y="694" text-anchor="middle" fill="#9690AE" font-size="11">Acessível por qualquer pessoa</text>
