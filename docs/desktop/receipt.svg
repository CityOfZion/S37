      <text x="24" y="196" fill="#3F3954" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600">0x7f9c2a3b8e1d4f5a6b7c8d9e2a3b4c5d6e7f8a9b3d2a</text>

      <text x="24" y="236" fill="#6E6884">ID Mercuryo (off-ramp)</text>
      <text x="24" y="258" fill="#3F3954" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">MX-2026-A7B3-9F2C</text>

      <text x="24" y="298" fill="#6E6884">Bloco de execução</text>
      <text x="24" y="320" fill="#3F3954" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">#47291038</text>

      <text x="24" y="360" fill="#6E6884">Tempo até finalidade</text>
      <text x="24" y="382" fill="#3F3954" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">5,2s</text>

      <text x="24" y="422" fill="#6E6884">Tempo até PIX confirmado</text>
      <text x="24" y="444" fill="#3F3954" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">2m 47s</text>

      <text x="24" y="484" fill="#6E6884">Valor original (USDC)</text>
      <text x="24" y="506" fill="#3F3954" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">232.71 USDC</text>

      <text x="24" y="546" fill="#6E6884">Taxa de câmbio aplicada</text>
      <text x="24" y="568" fill="#3F3954" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">1 USDC = R$ 5.348</text>
