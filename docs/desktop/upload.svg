<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Manrope, system-ui, sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7B61FF"/><stop offset="1" stop-color="#B388FF"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="900" fill="#F8F7FB"/>

  <!-- SIDEBAR -->
  <rect x="0" y="0" width="240" height="900" fill="#1A1832"/>
  <g transform="translate(24, 32)">
    <line x1="24" y1="8" x2="8" y2="40" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="24" y1="8" x2="40" y2="40" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="8" y1="40" x2="40" y2="40" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <circle cx="24" cy="8" r="7" fill="#FFFFFF"/>
    <circle cx="8" cy="40" r="7" fill="#FFFFFF"/>
    <circle cx="40" cy="40" r="7" fill="#00C9A7"/>
    <text x="58" y="32" fill="#FFFFFF" font-size="18" font-weight="800" letter-spacing="-0.5">FractaPay</text>
  </g>

  <text x="24" y="124" fill="#6E6884" font-size="10" font-weight="700" letter-spacing="1.5">MENU PRINCIPAL</text>
  <g font-size="14" font-weight="500">
    <text x="32" y="166" font-size="16" fill="#9690AE">🏠</text><text x="60" y="166" fill="#C9B5FF">Início</text>
    <text x="32" y="208" font-size="16" fill="#9690AE">📋</text><text x="60" y="208" fill="#C9B5FF">Contratos</text>
    <text x="32" y="250" font-size="16" fill="#9690AE">✨</text><text x="60" y="250" fill="#C9B5FF">Chat IA</text>

    <!-- Active: Upload manual -->
    <rect x="12" y="264" width="216" height="44" rx="10" fill="#7B61FF"/>
    <text x="32" y="292" font-size="16">📤</text><text x="60" y="292" fill="#FFFFFF" font-weight="600">Upload manual</text>

    <text x="32" y="334" font-size="16" fill="#9690AE">🧾</text><text x="60" y="334" fill="#C9B5FF">Recibos</text>
    <text x="32" y="376" font-size="16" fill="#9690AE">👥</text><text x="60" y="376" fill="#C9B5FF">Destinatários</text>
  </g>

  <rect x="12" y="816" width="216" height="64" rx="12" fill="#FFFFFF" fill-opacity="0.08"/>
  <rect x="24" y="828" width="40" height="40" rx="20" fill="url(#brand)"/>
  <text x="44" y="853" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">CC</text>
  <text x="72" y="843" fill="#FFFFFF" font-size="13" font-weight="600">Caroline C.</text>
  <text x="72" y="860" fill="#9690AE" font-size="11">Madame Rudini</text>

  <!-- TOP BAR -->
  <rect x="240" y="0" width="1200" height="72" fill="#FFFFFF"/>
  <line x1="240" y1="72" x2="1440" y2="72" stroke="#EFEDF5"/>

  <text x="272" y="44" fill="#1A1832" font-size="22" font-weight="800" letter-spacing="-0.5">Upload manual</text>
  <text x="430" y="44" fill="#6E6884" font-size="13">· envie seus relatórios sem precisar abrir o chat</text>

  <rect x="1304" y="20" width="120" height="40" rx="12" fill="#FFFFFF" stroke="#E0DCEC"/>
  <text x="1364" y="44" text-anchor="middle" fill="#3F3954" font-size="13" font-weight="600">✨ Usar chat IA</text>

  <!-- ========== MAIN: Two columns ========== -->
  <!-- LEFT: Drop zone -->
  <g transform="translate(272, 104)">
    <!-- Context: who is receiving -->
    <text x="0" y="20" fill="#6E6884" font-size="13" font-weight="600">Atribuir a um contrato:</text>

    <rect x="148" y="0" width="320" height="40" rx="10" fill="#FFFFFF" stroke="#E0DCEC"/>
    <text x="168" y="26" fill="#1A1832" font-size="13" font-weight="600">Royalties — Editora</text>
    <text x="448" y="26" text-anchor="end" fill="#9690AE" font-size="13">▾</text>

    <rect x="484" y="0" width="180" height="40" rx="10" fill="#F3EFFF"/>
    <text x="574" y="26" text-anchor="middle" fill="#4D33B5" font-size="13" font-weight="600">＋ Criar novo contrato</text>

    <!-- DROP ZONE (large) -->
    <rect x="0" y="64" width="800" height="420" rx="20" fill="#FFFFFF" stroke="#7B61FF" stroke-width="2" stroke-dasharray="10 6"/>

    <!-- Icon + content -->
    <g transform="translate(400, 200)">
      <circle cx="0" cy="-30" r="48" fill="#F3EFFF"/>
      <text x="0" y="-20" text-anchor="middle" font-size="44">📤</text>

      <text x="0" y="50" text-anchor="middle" fill="#1A1832" font-size="22" font-weight="800" letter-spacing="-0.5">Arraste arquivos aqui</text>
      <text x="0" y="78" text-anchor="middle" fill="#6E6884" font-size="14">ou clique para selecionar do seu computador</text>

      <g transform="translate(-92, 110)" filter="drop-shadow(0 8px 24px rgba(123,97,255,0.3))">
        <rect width="184" height="48" rx="12" fill="url(#brand)"/>
        <text x="92" y="30" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">Selecionar arquivos</text>
      </g>
    </g>

    <!-- Supported formats -->
    <text x="400" y="450" text-anchor="middle" fill="#9690AE" font-size="12">Formatos aceitos: CSV, XLSX, XLS, PDF, PNG, JPG · até 20 MB por arquivo</text>

    <!-- ========== FILE LIST ========== -->
    <text x="0" y="528" fill="#1A1832" font-size="16" font-weight="700">Arquivos desta sessão</text>
    <text x="800" y="528" text-anchor="end" fill="#7B61FF" font-size="13" font-weight="600">Limpar lista</text>

    <!-- File item 1: processed -->
    <g transform="translate(0, 548)">
      <rect width="800" height="68" rx="12" fill="#FFFFFF" filter="drop-shadow(0 1px 2px rgba(0,0,0,0.06))"/>
      <rect x="16" y="16" width="36" height="36" rx="8" fill="#C0F3E2"/>
      <text x="34" y="40" text-anchor="middle" fill="#003D33" font-size="11" font-weight="800">XLS</text>
      <text x="64" y="32" fill="#1A1832" font-size="14" font-weight="700">royalties_abril.xlsx</text>
      <text x="64" y="50" fill="#6E6884" font-size="12">128 KB · 42 linhas · 8 destinatárias identificadas</text>

      <rect x="500" y="22" width="100" height="24" rx="12" fill="#C0F3E2"/>
      <text x="550" y="38" text-anchor="middle" fill="#003D33" font-size="11" font-weight="700">✓ Processado</text>

      <rect x="612" y="18" width="140" height="32" rx="8" fill="url(#brand)"/>
      <text x="682" y="38" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">Revisar →</text>

      <text x="780" y="38" text-anchor="end" fill="#9690AE" font-size="16">⋯</text>
    </g>

    <!-- File item 2: processing -->
    <g transform="translate(0, 632)">
      <rect width="800" height="68" rx="12" fill="#FFFFFF" filter="drop-shadow(0 1px 2px rgba(0,0,0,0.06))"/>
      <rect x="16" y="16" width="36" height="36" rx="8" fill="#DDF0FF"/>
      <text x="34" y="40" text-anchor="middle" fill="#0B4F8A" font-size="11" font-weight="800">CSV</text>
      <text x="64" y="32" fill="#1A1832" font-size="14" font-weight="700">amazon_kdp_abril.csv</text>
      <text x="64" y="50" fill="#6E6884" font-size="12">64 KB · IA processando linhas…</text>

      <rect x="500" y="22" width="120" height="24" rx="12" fill="#DDF0FF"/>
      <text x="560" y="38" text-anchor="middle" fill="#0B4F8A" font-size="11" font-weight="700">⟳ Processando · 72%</text>

      <rect x="500" y="50" width="280" height="4" rx="2" fill="#EFEDF5"/>
      <rect x="500" y="50" width="200" height="4" rx="2" fill="#3CA7FF"/>

      <text x="780" y="38" text-anchor="end" fill="#9690AE" font-size="16">⋯</text>
    </g>

    <!-- File item 3: error -->
    <g transform="translate(0, 716)">
      <rect width="800" height="68" rx="12" fill="#FFFFFF" stroke="#FFE3E3" filter="drop-shadow(0 1px 2px rgba(0,0,0,0.06))"/>
      <rect x="16" y="16" width="36" height="36" rx="8" fill="#FFE3E3"/>
      <text x="34" y="40" text-anchor="middle" fill="#7A0E10" font-size="11" font-weight="800">PDF</text>
      <text x="64" y="32" fill="#1A1832" font-size="14" font-weight="700">tiktok_shop_relatorio.pdf</text>
      <text x="64" y="50" fill="#FF4D4F" font-size="12">Não consegui identificar pares destinatário/valor. Tente revisar manualmente.</text>

      <rect x="500" y="22" width="120" height="24" rx="12" fill="#FFE3E3"/>
      <text x="560" y="38" text-anchor="middle" fill="#7A0E10" font-size="11" font-weight="700">⚠ Erro de parsing</text>

      <rect x="632" y="18" width="120" height="32" rx="8" fill="#FFFFFF" stroke="#E0DCEC"/>
      <text x="692" y="38" text-anchor="middle" fill="#3F3954" font-size="13" font-weight="600">Abrir no chat →</text>

      <text x="780" y="38" text-anchor="end" fill="#9690AE" font-size="16">⋯</text>
    </g>
  </g>

  <!-- ========== RIGHT: Help panel ========== -->
  <g transform="translate(1100, 104)">
    <rect width="300" height="780" rx="16" fill="#1F1153"/>

    <text x="24" y="44" fill="#C9B5FF" font-size="11" font-weight="700" letter-spacing="1.5">COMO FUNCIONA</text>

    <g font-size="13" fill="#FFFFFF">
      <!-- Step 1 -->
      <circle cx="36" cy="80" r="14" fill="#7B61FF"/>
      <text x="36" y="85" text-anchor="middle" fill="#FFFFFF" font-weight="800" font-size="12">1</text>
      <text x="60" y="80" font-weight="700">Envie seus arquivos</text>
      <text x="60" y="100" fill="#9690AE" font-size="12">Arraste ou selecione CSV, XLSX,</text>
      <text x="60" y="118" fill="#9690AE" font-size="12">PDF ou imagens.</text>

      <!-- Step 2 -->
      <circle cx="36" cy="160" r="14" fill="#7B61FF"/>
      <text x="36" y="165" text-anchor="middle" fill="#FFFFFF" font-weight="800" font-size="12">2</text>
      <text x="60" y="160" font-weight="700">A IA processa</text>
      <text x="60" y="180" fill="#9690AE" font-size="12">Mesmo motor do chat extrai</text>
      <text x="60" y="198" fill="#9690AE" font-size="12">destinatários e valores.</text>

      <!-- Step 3 -->
      <circle cx="36" cy="240" r="14" fill="#7B61FF"/>
      <text x="36" y="245" text-anchor="middle" fill="#FFFFFF" font-weight="800" font-size="12">3</text>
      <text x="60" y="240" font-weight="700">Você revisa</text>
      <text x="60" y="260" fill="#9690AE" font-size="12">Tela de revisão obrigatória</text>
      <text x="60" y="278" fill="#9690AE" font-size="12">antes de qualquer pagamento.</text>

      <!-- Step 4 -->
      <circle cx="36" cy="320" r="14" fill="#00C9A7"/>
      <text x="36" y="325" text-anchor="middle" fill="#FFFFFF" font-weight="800" font-size="12">4</text>
      <text x="60" y="320" font-weight="700">Pagamentos saem via PIX</text>
      <text x="60" y="340" fill="#9690AE" font-size="12">Automaticamente, nos prazos</text>
      <text x="60" y="358" fill="#9690AE" font-size="12">configurados.</text>
    </g>

    <line x1="24" y1="392" x2="276" y2="392" stroke="#3F3954"/>

    <text x="24" y="424" fill="#C9B5FF" font-size="11" font-weight="700" letter-spacing="1.5">FORMATOS TESTADOS</text>

    <g font-size="12">
      <text x="24" y="452" fill="#9690AE">✓ Relatórios Amazon KDP</text>
      <text x="24" y="476" fill="#9690AE">✓ Relatórios TikTok Shop</text>
      <text x="24" y="500" fill="#9690AE">✓ Planilhas de royalty (Excel)</text>
      <text x="24" y="524" fill="#9690AE">✓ Folha de pagamento PJ/CLT</text>
      <text x="24" y="548" fill="#9690AE">✓ CSV de comissões</text>
      <text x="24" y="572" fill="#9690AE">✓ Print de painel admin</text>
    </g>

    <line x1="24" y1="606" x2="276" y2="606" stroke="#3F3954"/>

    <text x="24" y="638" fill="#FFFFFF" font-size="13" font-weight="700">💡 Dica</text>
    <text x="24" y="662" fill="#9690AE" font-size="12">Quanto mais estruturado o</text>
    <text x="24" y="680" fill="#9690AE" font-size="12">arquivo, melhor o parsing.</text>
    <text x="24" y="698" fill="#9690AE" font-size="12">Se a IA não conseguir,</text>
    <text x="24" y="716" fill="#9690AE" font-size="12">você pode abrir no chat e</text>
    <text x="24" y="734" fill="#9690AE" font-size="12">refinar conversando.</text>

    <rect x="24" y="752" width="252" height="36" rx="8" fill="#7B61FF"/>
    <text x="150" y="775" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="600">Abrir chat com último arquivo →</text>
  </g>
</svg>
