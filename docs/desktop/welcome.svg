<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Manrope, system-ui, sans-serif">
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7B61FF"/><stop offset="1" stop-color="#00C9A7"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7B61FF"/><stop offset="1" stop-color="#B388FF"/>
    </linearGradient>
  </defs>

  <!-- LEFT: Hero panel -->
  <rect width="720" height="900" fill="url(#hero)"/>
  <circle cx="600" cy="200" r="200" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="100" cy="600" r="160" fill="#FFFFFF" opacity="0.06"/>
  <circle cx="500" cy="800" r="100" fill="#FFFFFF" opacity="0.05"/>

  <!-- Logo top-left -->
  <g transform="translate(80, 80)">
    <g>
      <line x1="24" y1="8" x2="8" y2="40" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
      <line x1="24" y1="8" x2="40" y2="40" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
      <line x1="8" y1="40" x2="40" y2="40" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
      <circle cx="24" cy="8" r="8" fill="#FFFFFF"/>
      <circle cx="8" cy="40" r="8" fill="#FFFFFF"/>
      <circle cx="40" cy="40" r="8" fill="#FFFFFF"/>
    </g>
    <text x="60" y="38" fill="#FFFFFF" font-size="24" font-weight="800" letter-spacing="-0.8">FractaPay</text>
  </g>

  <!-- Headline -->
  <text x="80" y="380" fill="#FFFFFF" font-size="64" font-weight="800" letter-spacing="-2">Pagamentos</text>
  <text x="80" y="460" fill="#FFFFFF" font-size="64" font-weight="800" letter-spacing="-2">sem complicação.</text>

  <text x="80" y="510" fill="#FFFFFF" fill-opacity="0.9" font-size="20" font-weight="400">Distribua royalties, folha e comissões automaticamente.</text>
  <text x="80" y="538" fill="#FFFFFF" fill-opacity="0.9" font-size="20" font-weight="400">Você descreve, a gente faz.</text>

  <!-- Feature bullets -->
  <g transform="translate(80, 600)" font-size="15" font-weight="600">
    <g transform="translate(0, 0)">
      <rect width="36" height="36" rx="10" fill="#FFFFFF" fill-opacity="0.18"/>
      <text x="18" y="25" text-anchor="middle" font-size="18">✨</text>
      <text x="52" y="24" fill="#FFFFFF">IA que entende seus arquivos · CSV, XLSX, PDF, imagens</text>
    </g>
    <g transform="translate(0, 56)">
      <rect width="36" height="36" rx="10" fill="#FFFFFF" fill-opacity="0.18"/>
      <text x="18" y="25" text-anchor="middle" font-size="18">⚡</text>
      <text x="52" y="24" fill="#FFFFFF">PIX em até 10 minutos · taxa única de 1,5%</text>
    </g>
    <g transform="translate(0, 112)">
      <rect width="36" height="36" rx="10" fill="#FFFFFF" fill-opacity="0.18"/>
      <text x="18" y="25" text-anchor="middle" font-size="18">🔒</text>
      <text x="52" y="24" fill="#FFFFFF">Comprovante público auditável por destinatário</text>
    </g>
  </g>

  <!-- Bottom hint -->
  <text x="80" y="840" fill="#FFFFFF" fill-opacity="0.7" font-size="13">Já usado por editoras, agências e times financeiros pequenos no Brasil.</text>

  <!-- RIGHT: Login card -->
  <rect x="720" width="720" height="900" fill="#F8F7FB"/>

  <g transform="translate(840, 220)" filter="drop-shadow(0 16px 40px rgba(26,24,50,0.12))">
    <rect width="480" height="460" rx="24" fill="#FFFFFF"/>

    <text x="40" y="64" fill="#1A1832" font-size="32" font-weight="800" letter-spacing="-0.8">Entrar</text>
    <text x="40" y="92" fill="#6E6884" font-size="15">Acesse sua conta ou crie uma em 30 segundos.</text>

    <!-- Google button -->
    <g transform="translate(40, 130)">
      <rect width="400" height="56" rx="12" fill="#FFFFFF" stroke="#E0DCEC"/>
      <g transform="translate(140, 18)">
        <path d="M19.6 10.2c0-.71-.06-1.39-.18-2.04H10v3.86h5.38c-.23 1.24-.94 2.3-1.99 3.01v2.5h3.22c1.89-1.74 2.99-4.29 2.99-7.33z" fill="#4285F4"/>
        <path d="M10 20c2.7 0 4.97-.9 6.62-2.42l-3.22-2.5c-.9.6-2.04.96-3.4.96-2.61 0-4.82-1.76-5.61-4.13H1.07v2.6A10 10 0 0010 20z" fill="#34A853"/>
        <path d="M4.39 11.91A6 6 0 014.07 10c0-.66.11-1.29.31-1.9V5.5H1.07A10 10 0 000 10c0 1.61.39 3.13 1.07 4.49l3.32-2.58z" fill="#FBBC05"/>
        <path d="M10 3.98c1.47 0 2.79.5 3.83 1.5l2.87-2.87A10 10 0 0010 0 10 10 0 001.07 5.5l3.32 2.6C5.18 5.74 7.39 3.98 10 3.98z" fill="#EA4335"/>
      </g>
      <text x="200" y="34" text-anchor="middle" fill="#1F1153" font-size="15" font-weight="600">Continuar com Google</text>
    </g>

    <!-- Divider -->
    <line x1="40" y1="216" x2="180" y2="216" stroke="#E0DCEC"/>
    <text x="240" y="220" text-anchor="middle" fill="#9690AE" font-size="12" font-weight="500">ou</text>
    <line x1="300" y1="216" x2="440" y2="216" stroke="#E0DCEC"/>

    <!-- Passkey button -->
    <g transform="translate(40, 240)" filter="drop-shadow(0 8px 24px rgba(123,97,255,0.3))">
      <rect width="400" height="56" rx="12" fill="url(#brand)"/>
      <text x="200" y="34" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="600">🔐 Entrar com biometria</text>
    </g>

    <!-- Footer text -->
    <text x="240" y="340" text-anchor="middle" fill="#6E6884" font-size="13">Sua chave de acesso fica protegida no seu</text>
    <text x="240" y="358" text-anchor="middle" fill="#6E6884" font-size="13">dispositivo. Nem nós conseguimos acessar.</text>

    <!-- Sign up link -->
    <rect x="40" y="384" width="400" height="48" rx="12" fill="#F3EFFF"/>
    <text x="240" y="414" text-anchor="middle" fill="#4D33B5" font-size="14" font-weight="600">Primeira vez aqui? Criar conta →</text>
  </g>

  <!-- Right side footer -->
  <text x="1080" y="800" text-anchor="middle" fill="#9690AE" font-size="12">Ao continuar, você concorda com nossos</text>
  <text x="1080" y="820" text-anchor="middle" fill="#7B61FF" font-size="12" font-weight="600">Termos de uso · Política de privacidade</text>
</svg>
